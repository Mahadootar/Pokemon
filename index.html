<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon</title>
    <link rel="stylesheet" href="./style/assets.css" />
    <link rel="stylesheet" href="./style/standard.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body onload="init()">
    <header class="aot_header">
      <div class="header_con">
        <div class="pokebox-logo">
          <svg
            class="restaurent-logo"
            version="1.0"
            xmlns="http://www.w3.org/2000/svg"
            width="48.000000pt"
            height="48.000000pt"
            viewBox="0 0 48.000000 48.000000"
            preserveAspectRatio="xMidYMid meet"
          >
            <g
              transform="translate(0.000000,48.000000) scale(0.100000,-0.100000)"
              fill="#ff0000"
              stroke="none"
            >
              <path
                d="M176 425 c-42 -15 -96 -61 -96 -82 0 -18 35 -16 51 3 50 60 166 58
                222 -4 20 -21 47 -19 47 3 0 21 -66 73 -107 84 -49 14 -69 13 -117 -4z"
              />
              <path
                d="M50 280 c-12 -23 -6 -89 12 -125 27 -52 96 -105 138 -105 36 0 22 33
                -22 55 -57 27 -82 65 -88 132 -5 60 -22 78 -40 43z"
              />
              <path
                d="M200 280 c-25 -25 -26 -50 -2 -50 10 0 23 -5 30 -12 9 -9 15 -9 24 0
                7 7 20 12 30 12 10 0 18 7 18 15 0 22 -37 55 -60 55 -11 0 -29 -9 -40 -20z
                m50 -40 c0 -5 -4 -10 -10 -10 -5 0 -10 5 -10 10 0 6 5 10 10 10 6 0 10 -4 10
                -10z"
              />
              <path
                d="M397 293 c-4 -3 -7 -27 -7 -53 0 -60 -31 -108 -87 -135 -42 -20 -59
                -55 -28 -55 94 0 196 153 155 231 -11 20 -22 24 -33 12z"
              />
            </g>
          </svg>
        </div>
        <nav>
          <form id="search_form">
            <input
              oninput="searchPokemon()"
              id="search-input"
              type="text"
              placeholder="Enter Pokemon Name"
              name="pokemon"
            />
            <small id="search-hint" class="d_none"
              >please enter at least 3 characters></small
            >
          </form>
        </nav>
      </div>
    </header>
    <main>
      <div class="loading-roand" id="loading-sphere"></div>
      <section id="pokemonContent"></section>
      <button onclick="loadMorePokedex()" class="btn_load">
        load Pokemons
      </button>
    </main>
    <footer>
      <div class="footer_div">
        <p>Made by: Mahad Yussuf Nur</p>
        <p>@ 2026 Pokedex <a href="./impressum.html">impressum</a></p>
        <p>
          <a href="./datenschutz.html">Datenschutz</a>
        </p>
      </div>
    </footer>

    <dialog
      id="dialog_id"
      aria-labelledby="dialog-title"
      aria-describedby="dialogDescription"
      onclick="closeDialog()"
    >
      <div
        class="dialog_content"
        onclick="stopEventBubbling(event)"
        id="dialog_content"
      >
        <div class="dialog-Header_container">
          <header class="pokemon_img_header">
            <h4 class="pokemon-title" id="dialog-title"></h4>
          </header>
        </div>
        <section id="dialogDescription">
          <div class="current_img_container">
            <img class="currentImage" id="dialog_img" />
          </div>
          <div id="type_pokemon_dialog"></div>
        </section>
        <section class="poke_info_section">
          <nav>
            <button
              onclick="
                showTabsInfo('main');
                renderMainTab(currentPokemon);
              "
            >
              main
            </button>
            <button
              onclick="
                showTabsInfo('stats');
                renderStatsTab(currentPokemon);
              "
            >
              stats
            </button>
            <button
              onclick="
                showTabsInfo('evo');
                renderEvoTab(currentPokemon);
              "
            >
              evo Chain
            </button>
          </nav>
          <div id="tab_content">
            <div id="tab_main"></div>
            <div id="tab_stats" class="d_none"></div>
            <div id="tab_evo" class="d_none"></div>
          </div>
          <div class="next_previos_container">
            <button onclick="previousPokemon()" class="next_pokemon"><</button>

            <button onclick="nextPokemon()" class="next_pokemon">></button>
          </div>
        </section>
      </div>
    </dialog>
  </body>
  <script src="./script_folder/db.js"></script>
  <script src="./script_folder/templats.js"></script>
  <script src="./script.js"></script>
</html>
